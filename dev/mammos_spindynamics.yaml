# for a single run
metadata:
    UppASD_version: "v6.0.2"
    mammos_spindynamics_version: "0.2.2"
    mode: 'run'
    start_time: '2025-11-26T12:00:00'
    end_time: "2025-11-26T13:00:00"
    elapsed_time: "01:00:00"
    comment: "comment"
    index: 0
parameters:
    T: 10

---

# for a temperature sweep
metadata:
    comment: "comment"
    index: 0
    mode: 'temperature_sweep'
parameters:
    T: [10, 60, 110, 160, ...]



---

# for the top level
metadata:
    mode: 'mammos_uppasd_data'
history:
    - run-0
    - temperature_sweep-0
    - temperature_sweep-1
    - run-1
    - run-2
    ...
